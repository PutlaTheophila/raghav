<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Visual journey of research and lab life at the Medishetty Lab, IIT Bhilai.">
  <title>Gallery | Medishetty Lab</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* --- THEME ENGINE VARIABLES --- */
    :root[data-theme="light"] {
        --bg-color: #FCFCFA;
        --text-main: #1F2937;
        --text-muted: #4B5563;
        --card-bg: #FFFFFF;
        --card-border: #E5E7EB;
        --nav-bg: rgba(255, 255, 255, 0.95);
        --nav-text: #1F2937;
        --maroon: #A31F34;
        --hero-bg: linear-gradient(to right, #111, #222); /* Pure Dark Hero */
        --nav-text-top: #FFFFFF;
    }

    :root[data-theme="dark"] {
        --bg-color: #0F0F10;
        --text-main: #EEEEEE;
        --text-muted: #AAAAAA;
        --card-bg: #1A1A1B;
        --card-border: #2A2A2B;
        --nav-bg: rgba(15, 15, 16, 0.95);
        --nav-text: #FFFFFF;
        --maroon: #C52B44;
        --hero-bg: linear-gradient(to right, #000, #111);
        --nav-text-top: #FFFFFF;
    }

    body {
      font-family: 'Public Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    h1, h2, h3, .serif { font-family: 'Crimson Pro', serif; }

    /* --- NAVBAR FIX (Synchronized with Facilities) --- */
    #navbar {
      position: fixed; top: 0; width: 100%; height: 80px;
      z-index: 1000; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--nav-text-top); /* White text while over dark hero */
    }

    #navbar.scrolled {
      background-color: var(--nav-bg);
      height: 70px;
      color: var(--nav-text) !important;
      box-shadow: 0 4px 30px rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
    }

    /* Important: Ensure nav links respect the scroll state */
    #navbar.scrolled a, #navbar.scrolled button { color: var(--nav-text) !important; }
    #navbar a, #navbar button { color: inherit; transition: color 0.3s; }

    /* Page Header */
    .page-header {
      background: var(--hero-bg);
      padding: 140px 0 80px;
      border-bottom: 5px solid var(--maroon);
    }

    /* Masonry Style Grid */
    .gallery-container {
      column-count: 1;
      column-gap: 1.5rem;
    }
    @media (min-width: 768px) { .gallery-container { column-count: 2; } }
    @media (min-width: 1024px) { .gallery-container { column-count: 3; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      border-radius: 4px;
    }

    .gallery-item:hover {
      border-color: var(--maroon);
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
    }
    
    .gallery-item:hover img { transform: scale(1.03); }

    .gallery-info { padding: 1.25rem; }

    .tag {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--maroon);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      display: block;
    }

    .item-title { color: var(--text-main); }
    .item-desc { color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>

  <nav id="navbar" class="flex items-center"></nav>

  <header class="page-header">
    <div class="container max-w-6xl mx-auto px-6">
      <div class="inline-block px-3 py-1 bg-[#A31F34] text-white text-[10px] font-bold tracking-widest uppercase mb-4">Visual Records</div>
      <h1 class="text-5xl md:text-6xl text-white font-bold serif">Gallery</h1>
      <p class="text-gray-400 mt-6 max-w-2xl text-lg italic leading-relaxed">
        "Observing the intersection of chemistry and mechanics through a visual chronicle of our laboratory journey."
      </p>
    </div>
  </header>

  <main class="container max-w-6xl mx-auto px-6 py-20">
    <div id="gallery-grid" class="gallery-container">
      <div class="text-center py-20 col-span-full">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-[#A31F34] mb-4"></div>
        <p class="opacity-50 italic">Curating visual records...</p>
      </div>
    </div>

    <div class="mt-20 pt-10 border-t border-[var(--card-border)] flex justify-between items-center">
      <p class="text-sm opacity-50 italic">© Medishetty Lab. All rights reserved.</p>
      <a href="../index.html" class="text-xs font-bold uppercase tracking-widest hover:underline" style="color: var(--maroon)">Return to Home</a>
    </div>
  </main>

  <footer id="footer"></footer>

  <script>
    // --- COMPONENT LOADER & THEME SYNC ---
    function loadComponent(id, path) {
      fetch(path)
        .then(r => r.ok ? r.text() : Promise.reject())
        .then(html => {
          document.getElementById(id).innerHTML = html;
          if(id === 'navbar') initThemeEngine();
        })
        .catch(err => console.error(`Error loading ${path}`));
    }

    function initThemeEngine() {
      const savedTheme = localStorage.getItem('lab-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      btns.forEach(btn => {
        if(btn) {
          // Re-bind click listeners correctly
          btn.replaceWith(btn.cloneNode(true));
          const newBtn = document.getElementById(btn.id);
          newBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('lab-theme', target);
            updateToggleIcons(target);
          });
        }
      });
      updateToggleIcons(savedTheme);
    }

    function updateToggleIcons(theme) {
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      const sun = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
      const moon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      btns.forEach(btn => { if(btn) btn.innerHTML = (theme === 'dark' ? sun : moon); });
    }

    // --- SCROLL LOGIC ---
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (window.scrollY > 50) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    });

    // --- GALLERY DATA FETCH (LOCAL JSON) ---
    async function fetchGallery() {
      try {
        const response = await fetch('../src/gallery.json');
        const data = await response.json();
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = ''; 

        data.forEach(item => {
          const card = document.createElement('div');
          card.className = 'gallery-item';
          card.innerHTML = `
            <img src="${item.image}" alt="${item.title}" loading="lazy">
            <div class="gallery-info">
              <span class="tag">${item.category}</span>
              <h3 class="font-bold text-lg serif item-title">${item.title}</h3>
              <p class="item-desc mt-2 leading-relaxed">${item.description}</p>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        document.getElementById('gallery-grid').innerHTML = '<p class="text-center opacity-50 col-span-full">Unable to load gallery records.</p>';
      }
    }

    loadComponent('navbar', '../components/navbar.html');
    loadComponent('footer', '../components/footer.html');
    fetchGallery();

    // --- MOBILE MENU HANDLER ---
    document.addEventListener("click", function(e){
        // OPEN / CLOSE MENU
        if(e.target.id === "mobile-toggle-trigger"){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.toggle("active");
            }
        }

        // CLOSE MENU WHEN LINK CLICKED
        if(e.target.closest("#mobile-menu a")){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.remove("active");
            }
        }
    });
  </script>
</body>
</html>
