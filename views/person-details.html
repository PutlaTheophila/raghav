<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Researcher profile at Professor Raghavendar's Lab, IIT Bhilai.">
  <title>Profile | Medishetty Lab</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* --- THEME ENGINE VARIABLES --- */
    :root[data-theme="light"] {
        --bg-color: #FCFCFA;
        --text-main: #1F2937;
        --text-muted: #4B5563;
        --card-bg: #FFFFFF;
        --card-border: #E5E7EB;
        --nav-bg: rgba(255, 255, 255, 0.95);
        --nav-text: #1F2937;
        --maroon: #A31F34;
        --hero-bg: linear-gradient(to right, #111, #222);
        --nav-text-top: #FFFFFF;
    }

    :root[data-theme="dark"] {
        --bg-color: #0F0F10;
        --text-main: #EEEEEE;
        --text-muted: #AAAAAA;
        --card-bg: #1A1A1B;
        --card-border: #2A2A2B;
        --nav-bg: rgba(15, 15, 16, 0.95);
        --nav-text: #FFFFFF;
        --maroon: #C52B44;
        --hero-bg: linear-gradient(to right, #000, #111);
        --nav-text-top: #FFFFFF;
    }

    body {
      font-family: 'Public Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    h1, h2, h3, .serif { font-family: 'Crimson Pro', serif; }

    /* --- NAVBAR (Synchronized) --- */
    #navbar {
      position: fixed; top: 0; width: 100%; height: 80px;
      z-index: 1000; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--nav-text-top);
    }

    #navbar.scrolled {
      background-color: var(--nav-bg);
      height: 70px;
      color: var(--nav-text) !important;
      box-shadow: 0 4px 30px rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
    }

    #navbar.scrolled a, #navbar.scrolled button { color: var(--nav-text) !important; }
    #navbar a, #navbar button { color: inherit; transition: color 0.3s; }

    /* Profile Header */
    .profile-header {
      background: var(--hero-bg);
      padding: 140px 0 60px;
      color: white;
      border-bottom: 5px solid var(--maroon);
    }

    .profile-img {
      width: 240px; height: 280px;
      object-fit: cover; border: 4px solid white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Content Cards */
    .content-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 2rem;
      transition: all 0.3s ease;
    }

    .pub-card {
      border-left: 3px solid var(--card-border);
      padding-left: 1.5rem;
      margin-bottom: 2rem;
      transition: all 0.3s ease;
    }
    .pub-card:hover { border-left-color: var(--maroon); }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.75rem;
      color: var(--maroon);
      transition: all 0.3s ease;
    }
    .back-btn:hover { transform: translateX(-5px); }

    /* Loading Pulse Fix */
    .pulse-bg { background-color: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <nav id="navbar" class="flex items-center"></nav>

  <header class="profile-header">
    <div class="container max-w-6xl mx-auto px-6">
      <div id="header-content" class="flex flex-col md:flex-row items-center gap-10">
        <div class="animate-pulse pulse-bg w-48 h-60 rounded-sm"></div>
      </div>
    </div>
  </header>

  <main class="container max-w-6xl mx-auto px-6 py-16">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
      
      <div class="lg:col-span-2">
        <section class="mb-12">
          <h2 class="text-3xl font-bold serif mb-6 border-b pb-2" style="border-color: var(--card-border)">Biography</h2>
          <p id="person-bio" class="opacity-80 leading-relaxed text-lg italic">
            Loading biography...
          </p>
        </section>

        <section id="publications-section" class="hidden">
          <h2 class="text-3xl font-bold serif mb-6 border-b pb-2" style="border-color: var(--card-border)">Selected Publications</h2>
          <div id="publications-list" class="space-y-6"></div>
        </section>
      </div>

      <div class="lg:col-span-1">
        <div class="content-card sticky top-32">
          <h3 class="text-xl font-bold serif mb-4 border-b pb-2" style="border-color: var(--card-border)">Academic Background</h3>
          <ul id="education-list" class="space-y-4 text-sm opacity-80">
            </ul>
          
          <div class="mt-10 pt-6 border-t" style="border-color: var(--card-border)">
            <a href="people.html" class="back-btn">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
              Back to People
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer id="footer"></footer>

  <script>
    // --- COMPONENT LOADER & THEME SYNC ---
    function loadComponent(id, path) {
      fetch(path)
        .then(r => r.ok ? r.text() : Promise.reject())
        .then(html => {
          document.getElementById(id).innerHTML = html;
          if(id === 'navbar') initThemeEngine();
        });
    }

    function initThemeEngine() {
      const savedTheme = localStorage.getItem('lab-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      btns.forEach(btn => {
        if(btn) {
          btn.replaceWith(btn.cloneNode(true));
          const newBtn = document.getElementById(btn.id);
          newBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('lab-theme', target);
            updateToggleIcons(target);
          });
        }
      });
      updateToggleIcons(savedTheme);
    }

    function updateToggleIcons(theme) {
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      const sun = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
      const moon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      btns.forEach(btn => { if(btn) btn.innerHTML = (theme === 'dark' ? sun : moon); });
    }

    // --- SCROLL LOGIC ---
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (window.scrollY > 50) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    });

    // --- DATA LOGIC ---
    const params = new URLSearchParams(window.location.search);
    const personId = params.get('id');

    fetch('../src/people.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        let person = null;

        function findPerson(obj) {
          for (const key in obj) {
            if (Array.isArray(obj[key])) {
              const found = obj[key].find(p => String(p.id) === String(personId));
              if (found) { person = found; return; }
            } else if (typeof obj[key] === 'object' && obj[key] !== null) {
              findPerson(obj[key]);
            }
            if (person) return;
          }
        }
        findPerson(data);

        if (!person) {
          document.querySelector('main').innerHTML = `<div class="text-center py-40"><h1 class="text-4xl serif">Profile Not Found</h1><a href="people.html" class="text-maroon underline mt-4 block" style="color: var(--maroon)">Return to Team Page</a></div>`;
          return;
        }

        // Populate Header
        document.getElementById('header-content').innerHTML = `
          <img src="${person.image || '../assets/peerson.png'}" alt="${person.name}" class="profile-img">
          <div class="text-center md:text-left">
            <h1 class="text-5xl md:text-6xl font-bold serif text-white">${person.name}</h1>
            <p class="text-xl text-gray-400 serif italic mt-2">${person.degree || 'Research Member'}</p>
            ${person.email ? `<p class="mt-6 text-sm font-bold tracking-widest uppercase text-white bg-[#A31F34] inline-block px-4 py-1">${person.email}</p>` : ''}
          </div>
        `;

        // Populate Bio
        document.getElementById('person-bio').textContent = person.description || "A dedicated researcher at IIT Bhilai focusing on advanced crystal engineering and solid-state photochemistry.";

        // Populate Education
        const eduList = document.getElementById('education-list');
        if (person.education) {
          const eduKeys = { 'bsc': 'B.Sc.', 'msc': 'M.Sc.', 'phd': 'Ph.D.' };
          Object.keys(eduKeys).forEach(key => {
            if (person.education[key]) {
              const li = document.createElement('li');
              li.innerHTML = `<span class="block font-bold" style="color: var(--text-main)">${eduKeys[key]}</span> ${person.education[key]}`;
              eduList.appendChild(li);
            }
          });
        }

        // Populate Publications
        if (person.publications && person.publications.length > 0) {
          const pubSection = document.getElementById('publications-section');
          const pubList = document.getElementById('publications-list');
          pubSection.classList.remove('hidden');

          person.publications.forEach((pub, index) => {
            const div = document.createElement('div');
            div.className = 'pub-card';
            // Handle both string and object formats
            if (typeof pub === 'string') {
              div.innerHTML = `
                <p class="text-sm mb-1" style="color: var(--maroon); font-weight: 600;">${index + 1}.</p>
                <p class="text-sm leading-relaxed" style="color: var(--text-main)">${pub}</p>
              `;
            } else {
              div.innerHTML = `
                <p class="text-xs opacity-60 mb-1">${pub.authors}</p>
                <a href="${pub.link}" target="_blank" class="text-lg font-bold serif hover:text-maroon transition-colors leading-tight block" style="color: var(--text-main)">
                  ${pub.title}
                </a>
                <p class="text-sm opacity-50 mt-2 font-medium italic">${pub.journal}</p>
              `;
            }
            pubList.appendChild(div);
          });
        }
      })
      .catch(err => console.error("Fetch Error:", err));

    loadComponent('navbar', '../components/navbar.html');
    loadComponent('footer', '../components/footer.html');

    // --- MOBILE MENU HANDLER ---
    document.addEventListener("click", function(e){
        // OPEN / CLOSE MENU
        if(e.target.id === "mobile-toggle-trigger"){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.toggle("active");
            }
        }

        // CLOSE MENU WHEN LINK CLICKED
        if(e.target.closest("#mobile-menu a")){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.remove("active");
            }
        }
    });
  </script>
</body>
</html>
