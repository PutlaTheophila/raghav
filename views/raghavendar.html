<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Profile of Principal Investigator, Medishetty Lab.">
  <title>Principal Investigator | Medishetty Lab</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* --- THEME ENGINE VARIABLES --- */
    :root[data-theme="light"] {
        --bg-color: #FCFCFA;
        --text-main: #1F2937;
        --text-muted: #4B5563;
        --card-bg: #FFFFFF;
        --card-border: #E5E7EB;
        --nav-bg: rgba(255, 255, 255, 0.9);
        --maroon: #A31F34;
        --stat-bg: #F9FAFB;
        --hero-gradient: linear-gradient(to right, #111, #222);
    }

    :root[data-theme="dark"] {
        --bg-color: #0F0F10;
        --text-main: #EEEEEE;
        --text-muted: #AAAAAA;
        --card-bg: #1A1A1B;
        --card-border: #2A2A2B;
        --nav-bg: rgba(15, 15, 16, 0.9);
        --maroon: #C52B44;
        --stat-bg: #242426;
        --hero-gradient: linear-gradient(to right, #000, #111);
    }

    body { font-family: 'Public Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.4s ease, color 0.4s ease; margin: 0; }
    h1, h2, h3, .serif { font-family: 'Crimson Pro', serif; }
    .navbar-spacer { height: 80px; }

    .profile-header { background: var(--hero-gradient); padding: 100px 0 60px; color: white; border-bottom: 5px solid var(--maroon); }
    .faculty-image { width: 280px; height: 280px; object-fit: cover; border: 4px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

    .content-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 2.5rem; margin-bottom: 2rem; transition: all 0.3s ease; }
    .section-title { font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .section-title::after { content: ""; height: 2px; background: var(--card-border); flex-grow: 1; }

    .pub-item { padding: 1.25rem 0; border-bottom: 1px solid var(--card-border); }
    .pub-item:last-child { border-bottom: none; }
    .pub-link { font-size: 1.15rem; font-weight: 600; color: var(--text-main); line-height: 1.4; display: block; margin-bottom: 0.5rem; }
    .pub-link:hover { color: var(--maroon); text-decoration: underline; }
    .pub-meta { font-size: 0.9rem; color: var(--text-muted); font-style: italic; }
    .stat-badge { background: var(--stat-bg); border-left: 4px solid var(--maroon); padding: 1rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

  <nav id="navbar" class="fixed top-0 w-full z-50 h-20 flex items-center transition-all duration-300"></nav>
  <div class="navbar-spacer"></div>

  <header class="profile-header">
    <div class="container max-w-6xl mx-auto px-6">
      <div class="flex flex-col md:flex-row items-center gap-12" id="hero-content">
        <div class="py-20 text-center w-full">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-white mb-4"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="container max-w-6xl mx-auto px-6 py-20">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
      <div class="lg:col-span-2">
        <section class="mb-16">
          <h2 class="section-title serif">Biography</h2>
          <div class="content-card" id="bio-container">
            <div class="py-10 text-center">
              <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-[#A31F34]"></div>
            </div>
          </div>
        </section>

        <section>
          <div class="flex justify-between items-end mb-8">
            <h2 class="section-title serif m-0">Portfolio & Projects</h2>
            <a href="publications.html" class="font-bold text-sm hover:underline" style="color: var(--maroon)">View All →</a>
          </div>
          <div class="content-card" id="pub-container">
            <div class="py-10 text-center">
              <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-[#A31F34]"></div>
            </div>
          </div>
        </section>
      </div>

      <div class="lg:col-span-1">
        <div class="sticky top-32" id="sidebar-content">
          <div class="py-10 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-[#A31F34]"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer id="footer"></footer>

  <script>
    // 1. Data Fetching & Rendering (LOCAL JSON)
    async function loadPIData() {
      try {
        const response = await fetch('../src/medishetty.json');
        const data = await response.json();

        // Render Hero
        document.getElementById('hero-content').innerHTML = `
          <div class="relative">
            <img src="${data.image}" alt="${data.name}" class="faculty-image">
            <div class="absolute -bottom-4 -right-4 bg-[#A31F34] text-white p-4 font-bold text-center leading-tight shadow-lg">
              ${data.affiliation.split(' ').slice(0, 3).join('<br>')}
            </div>
          </div>
          <div class="text-center md:text-left">
            <p class="font-bold tracking-[0.3em] text-sm uppercase mb-3" style="color: var(--maroon)">${data.position}</p>
            <h1 class="text-5xl md:text-7xl font-bold serif mb-4">${data.name}</h1>
            <p class="text-xl text-gray-300 serif italic mb-6">${data.title}</p>
          </div>
        `;

        // Render Bio
        document.getElementById('bio-container').innerHTML = `<p class="leading-relaxed text-lg mb-6">${data.bio}</p>`;

        // Render Portfolio/Publications
        document.getElementById('pub-container').innerHTML = data.portfolio.map(item => `
          <div class="pub-item">
            <a href="${item.link}" class="pub-link serif">${item.title}</a>
            <p class="pub-meta mt-2">${item.description}</p>
          </div>
        `).join('');

        // Render Sidebar
        document.getElementById('sidebar-content').innerHTML = `
          <div class="content-card p-8 border-t-4" style="border-top-color: var(--maroon)">
            <h3 class="text-xl font-bold serif mb-6">Education</h3>
            <div class="space-y-6 text-sm">
              <div>
                ${data.education.map(edu => `
                  <div class="stat-badge">
                     <p class="font-semibold">${edu}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
          <div class="bg-zinc-900 text-white p-8 rounded-sm">
            <h3 class="text-xl font-bold serif mb-4">Research Focus</h3>
            <p class="text-sm text-zinc-400 leading-relaxed">${data.research}</p>
          </div>
        `;

      } catch (err) {
        console.error("Error loading PI data:", err);
      }
    }

    // 2. Component Loader & Theme Engine (Kept from original)
    function loadComponent(id, path) {
      fetch(path).then(r => r.text()).then(data => {
        document.getElementById(id).innerHTML = data;
        if(id === 'navbar') initThemeEngine();
      });
    }

    function initThemeEngine() {
      const savedTheme = localStorage.getItem('lab-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      btns.forEach(btn => {
        if(btn) btn.addEventListener('click', () => {
          const target = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', target);
          localStorage.setItem('lab-theme', target);
          updateToggleIcons(target);
        });
      });
      updateToggleIcons(savedTheme);
    }

    function updateToggleIcons(theme) {
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      const sunIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
      const moonIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      btns.forEach(btn => { if(btn) btn.innerHTML = (theme === 'dark' ? sunIcon : moonIcon); });
    }

    loadComponent('navbar', '../components/navbar.html');
    loadComponent('footer', '../components/footer.html');
    loadPIData();

    // --- SCROLL LOGIC ---
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (window.scrollY > 50) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    });

    // --- MOBILE MENU HANDLER ---
    document.addEventListener("click", function(e){
        // OPEN / CLOSE MENU
        if(e.target.id === "mobile-toggle-trigger"){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.toggle("active");
            }
        }

        // CLOSE MENU WHEN LINK CLICKED
        if(e.target.closest("#mobile-menu a")){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.remove("active");
            }
        }
    });
  </script>
</body>
</html>
