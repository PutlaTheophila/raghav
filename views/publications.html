<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Explore research publications from Medishetty Laboratory at IIT Bhilai.">
  <title>Publications | Medishetty Lab</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* --- THEME ENGINE VARIABLES --- */
    :root[data-theme="light"] {
        --bg-color: #FFFFFF;
        --text-main: #1F2937;
        --text-muted: #4B5563;
        --card-bg: #FFFFFF;
        --card-border: #E5E7EB;
        --nav-bg: rgba(255, 255, 255, 0.95);
        --maroon: #4D407D;
        --hero-bg: linear-gradient(135deg, #131020 0%, #2A2540 55%, #4D407D 130%);
        --img-bg: #FFFFFF;
        --nav-text-top: #FFFFFF; /* White text at top of hero */
    }

    :root[data-theme="dark"] {
        --bg-color: #0F0D16;
        --text-main: #EEEEEE;
        --text-muted: #AAAAAA;
        --card-bg: #181525;
        --card-border: #2A2540;
        --nav-bg: rgba(15, 13, 22, 0.95);
        --maroon: #8A83AC;
        --hero-bg: linear-gradient(135deg, #0A0812 0%, #1A1729 60%, #2A2540 130%);
        --img-bg: #ffffff;
        --nav-text-top: #FFFFFF;
    }

    body {
      font-family: 'Public Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    h1, h2, h3, .serif { font-family: 'Crimson Pro', serif; }

    /* --- NAVBAR FIX --- */
    #navbar {
      position: fixed; top: 0; width: 100%; height: 80px;
      z-index: 1000; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--nav-text-top); /* Force white at top */
    }

    #navbar.scrolled {
      background-color: var(--nav-bg);
      height: 70px;
      color: var(--text-main); /* Flips to theme color on scroll */
      box-shadow: 0 4px 30px rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
    }

    /* Page Header */
    .page-header {
      background: var(--hero-bg);
      padding: 140px 0 80px; /* Increased top padding to avoid nav overlap */
      border-bottom: 5px solid var(--maroon);
    }

    /* Publication Card — academic reference layout */
    .publication-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .publication-card:hover {
      border-color: var(--maroon);
      box-shadow: 0 14px 30px -18px rgba(45,35,80,0.25);
    }

    /* Journal citation strip */
    .pub-journal-strip {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.85rem 2.25rem;
      background-color: rgba(138,131,172,0.10);
      border-bottom: 1px solid var(--card-border);
      color: var(--maroon);
    }
    .pub-journal-ref {
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--maroon);
      letter-spacing: 0.01em;
    }
    .pub-journal-ref:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* Main body: text + figure left, cover right */
    .pub-main {
      display: flex;
      gap: 2.5rem;
      padding: 2rem 2.25rem 2.25rem;
    }

    .pub-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .pub-title {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.01em;
    }
    .pub-title a {
      color: var(--maroon);
      transition: opacity 0.25s ease;
    }
    .pub-title a:hover { opacity: 0.8; }

    .pub-authors {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .pub-abstract {
      display: block;
      margin: 1.75rem auto;
      max-width: 88%;
      max-height: 300px;
      object-fit: contain;
    }

    /* Journal / book cover on the right */
    .pub-cover {
      flex-shrink: 0;
      width: 185px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pub-cover img {
      width: 100%;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 5px;
      background-color: #fff;
      box-shadow: 0 10px 24px -14px rgba(19,16,32,0.3);
    }

    .read-link {
      margin-top: auto;
      align-self: flex-start;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--maroon);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-link:hover { text-decoration: underline; text-underline-offset: 4px; }

    @media (max-width: 850px) {
      .pub-main { flex-direction: column-reverse; gap: 1.5rem; }
      .pub-cover { width: 140px; margin: 0 auto; }
      .pub-journal-strip { padding: 0.85rem 1.5rem; }
      .pub-main { padding: 1.5rem; }
      .pub-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <nav id="navbar"></nav>

  <header class="page-header">
    <div class="container max-w-6xl mx-auto px-6">
      <div class="inline-block px-3 py-1 bg-[#4D407D] text-white text-[10px] font-bold tracking-widest uppercase mb-4">Scientific Contributions</div>
      <h1 class="text-5xl md:text-6xl text-white font-bold serif">Publications</h1>
      <p class="text-gray-400 mt-6 max-w-2xl text-lg leading-relaxed italic">
        "A chronicle of our research journey in crystal engineering and photomechanical materials."
      </p>
    </div>
  </header>

  <main class="container max-w-6xl mx-auto px-6 py-20">
    <div id="publications-list" class="flex flex-col gap-10">
      <div class="py-20 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-[#4D407D] mb-4"></div>
        <p class="opacity-50 italic">Synchronizing publication database...</p>
      </div>
    </div>

    <div class="mt-20 pt-10 border-t border-[var(--card-border)] flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="text-sm opacity-50">For full-text requests, please contact the corresponding author.</p>
      <a href="/medishetty/index.html" class="text-xs font-bold uppercase tracking-widest" style="color: var(--maroon)">Return to Home</a>
    </div>
  </main>

  <footer id="footer"></footer>

  <script>
    // --- COMPONENT LOADER & THEME ENGINE ---
    function loadComponent(id, path) {
      fetch(path).then(r => r.text()).then(html => {
        document.getElementById(id).innerHTML = html;
        if(id === 'navbar') initThemeEngine();
      });
    }

    function initThemeEngine() {
      const savedTheme = localStorage.getItem('lab-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      btns.forEach(btn => {
        if(btn) {
          btn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('lab-theme', target);
            updateToggleIcons(target);
          });
        }
      });
      updateToggleIcons(savedTheme);
    }

    function updateToggleIcons(theme) {
      const btns = [document.getElementById('themeBtn'), document.getElementById('themeBtnMobile')];
      const sun = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
      const moon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      btns.forEach(btn => { if(btn) btn.innerHTML = (theme === 'dark' ? sun : moon); });
    }

    // --- SCROLL LOGIC ---
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
    });

    // --- PUBLICATION RENDERER (LOCAL JSON) ---
    fetch('../src/publications.json')
      .then(r => r.json())
      .then(pubs => pubs)
      .then(pubs => {
        const list = document.getElementById('publications-list');
        list.innerHTML = '';
        const total = pubs.length;
        pubs.forEach((p, i) => {
          const card = document.createElement('div');
          card.className = 'publication-card';
          const doiLink = p.doi ? `https://doi.org/${p.doi}` : '#';
          const pubNumber = total - i;
          card.innerHTML = `
            <div class="pub-journal-strip">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <a href="${doiLink}" target="_blank" class="pub-journal-ref">${p.journal}, ${p.year}</a>
            </div>
            <div class="pub-main">
              <div class="pub-content">
                <h3 class="pub-title serif">
                  <a href="${doiLink}" target="_blank">${pubNumber}. ${p.title}</a>
                </h3>
                <p class="pub-authors">${p.authors}</p>
                ${p.image ? `<img class="pub-abstract" src="${p.image}" alt="Graphical abstract" loading="lazy" onerror="this.remove()">` : ''}
                <a href="${doiLink}" target="_blank" class="read-link">View Full Article <span>→</span></a>
              </div>
              <div class="pub-cover">
                <img src="../assets/facilities/image.png" alt="Journal cover" loading="lazy">
              </div>
            </div>
          `;
          list.appendChild(card);
        });
      });

    loadComponent('navbar', '../components/navbar.html');
    loadComponent('footer', '../components/footer.html');

    // --- MOBILE MENU HANDLER ---
    document.addEventListener("click", function(e){
        // OPEN / CLOSE MENU
        if(e.target.id === "mobile-toggle-trigger"){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.toggle("active");
            }
        }

        // CLOSE MENU WHEN LINK CLICKED
        if(e.target.closest("#mobile-menu a")){
            const menu = document.getElementById("mobile-menu");
            if(menu){
                menu.classList.remove("active");
            }
        }
    });
  </script>
</body>
</html>
